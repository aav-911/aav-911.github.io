    <!------- Projects Page Stylesheet ------->

    <link

  <body>
    <!-- Navigation Bar -->
    <nav>
      <div class="logo"><a href="../index.html">AAV</a></div>
      <div class="hamburger-menu" id="hamburger-menu">☰</div>

    <!---- Main Content ---->
    <div class="page-content">
      <!--- Loading Screen --->
      <div class="loader"></div>
      <div class="scroll-container">
        <div class="panel section-intro">
          <!-- Projects Information -->
          <div class="container">
            <h1>My Projects</h1>
            <p>
              Here is where you can find my projects and learn more about my
              work. Scroll through each category to explore.
            </p>
          </div>
        </div>

        <!-- Computer Programming Section -->
        <div class="panel section-programming">
          <div class="carousel-wrapper">
            <button
              class="carousel-button left"
              data-carousel="programming-carousel"
            >
              ←
            </button>
            <div class="projects-carousel" id="programming-carousel">
              <div class="card loading">
                <div class="card-loader"></div>
              </div>
            </div>
            <button
              class="carousel-button right"
              data-carousel="programming-carousel"
            >
              →
            </button>
          </div>
        </div>

        <!-- Game Development Section -->
        <div class="panel section-gamedev">
          <div class="carousel-wrapper">
            <button
              class="carousel-button left"
              data-carousel="gamedev-carousel"
            >
              ←
            </button>
            <div class="projects-carousel" id="gamedev-carousel">
              <div class="card loading">
                <div class="card-loader"></div>
              </div>
            </div>
            <button
              class="carousel-button right"
              data-carousel="gamedev-carousel"
            >
              →
            </button>
          </div>
        </div>

        <!-- Music Section -->
        <div class="panel section-music">
          <div class="carousel-wrapper">
            <button class="carousel-button left" data-carousel="music-carousel">
              ←
            </button>
            <div class="projects-carousel" id="music-carousel">
              <div class="card loading">
                <div class="card-loader"></div>
              </div>
            </div>
            <button
              class="carousel-button right"
              data-carousel="music-carousel"
            >
              →
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="../js/script.js"></script>
    <script src="../js/projects.js"></script>
